<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados Quiniela | BetAR Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bet-orange: #f58220;
            --bet-blue: #002d58;
            --bet-dark: #001e3a;
            --white: #ffffff;
            --gray: #f4f4f4;
        }

        body {
            background-color: var(--gray);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--bet-blue);
        }

        .header {
            background: var(--bet-blue);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: white;
            max-width: 500px;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            border-bottom: 4px solid var(--bet-orange);
        }

        .draw-header {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            background: var(--bet-dark);
            color: var(--white);
            font-size: 14px;
        }

        .main-number {
            text-align: center;
            padding: 20px;
            font-size: 48px;
            font-weight: 900;
            color: var(--bet-blue);
            background: linear-gradient(to bottom, #fff, #f9f9f9);
        }

        .grid-numbers {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 15px;
            background: #eee;
        }

        .small-number {
            background: white;
            padding: 8px;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .badge {
            background: var(--bet-orange);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="app">
    </div>

<script>
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        databaseURL: "https://quiniela-argentina-hoy-default-rtdb.firebaseio.com/",
        projectId: "quiniela-argentina-hoy",
        appId: "TU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('quiniela/cordoba').on('value', (snapshot) => {
        const data = snapshot.val();
        const app = document.getElementById('app');
        app.innerHTML = ''; // Limpiar

        for (const sorteo in data) {
            if (sorteo === 'actualizado') continue;
            
            const info = data[sorteo];
            const html = `
                <div class="card">
                    <div class="draw-header">
                        <span>${sorteo.replace('_', ' ').toUpperCase()}</span>
                        <span class="badge">EN VIVO</span>
                    </div>
                    <div class="main-number">${info.principal}</div>
                    <div class="grid-numbers">
                        ${info.extracto.map(n => `<div class="small-number">${n}</div>`).join('')}
                    </div>
                </div>
            `;
            app.innerHTML += html;
        }
    });
</script>
</body>
</html>
